<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlyFans - alectra00</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #242529;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .banner {
            background-color: #00aff0;
            height: 140px;
            width: 100%;
        }

        .profile-section {
            position: relative;
            padding: 0 20px 30px 20px;
        }

        .avatar-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #ffffff;
            border: 4px solid #ffffff;
            position: absolute;
            top: -60px; /* Flyttet lenger opp på banneren */
            left: 50%;
            transform: translateX(-50%);
            overflow: hidden;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            margin-top: 60px; /* Fikset avstand så teksten ikke krasjer med bildet */
        }

        .name-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 2px;
        }

        .info h1 {
            font-size: 19px;
            font-weight: 700;
            color: #242529;
        }

        .verified-badge {
            width: 18px;
            height: 18px;
            fill: #00aff0;
        }

        .info p.sub-text {
            color: #8a96a3;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .exclusive-box {
            background-color: #f0f9ff;
            border: 1px dashed #00aff0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .exclusive-box h2 {
            font-size: 15px;
            color: #00aff0;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        .btn-link {
            display: block;
            background-color: #00aff0;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            padding: 14px 20px;
            border-radius: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 175, 240, 0.2);
        }

        .btn-link:hover {
            background-color: #009ce0;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #8a96a3;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="banner"></div>

        <div class="profile-section">
            <div class="avatar-container">
                <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/532896a7-bd28-4259-9ba8-4a235dd7ff03-profile_image-70x70.png" alt="alectra00">
            </div>

            <div class="info">
                <div class="name-wrapper">
                    <h1>alectra00</h1>
                    <svg class="verified-badge" viewBox="0 0 24 24">
                        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <p class="sub-text">@alectra00 • 0 videoer</p>
                
                <div class="exclusive-box">
                    <h2>Eksklusivt innhold</h2>
                    <p style="color: #4a5568; font-size: 14px; margin-bottom: 0;">Lås opp feeden og se alt det private innholdet her.</p>
                </div>

                <a href="https://www.twitch.tv/alectra00" target="_blank" rel="noopener noreferrer" class="btn-link">
                    TRYKK HER FOR EKSKLUSIVE BILDER
                </a>
            </div>

            <div class="footer">
                © OnlyFans, 2026
            </div>
        </div>
    </div>

</body>
</html>
