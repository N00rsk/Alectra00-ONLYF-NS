<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlyFans - Alectra00</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #242529;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .banner {
            background: linear-gradient(135deg, #00aff0, #008ec2);
            height: 140px;
            width: 100%;
        }

        .profile-section {
            position: relative;
            padding: 0 20px 30px 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e2e8f0;
            border: 4px solid #ffffff;
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #00aff0;
        }

        .info {
            margin-top: 65px;
        }

        .info h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .info p {
            color: #8a96a3;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .exclusive-box {
            background-color: #f0f9ff;
            border: 1px dashed #00aff0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .exclusive-box h2 {
            font-size: 16px;
            color: #00aff0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-link {
            display: block;
            background-color: #00aff0;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            padding: 14px 20px;
            border-radius: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(0, 175, 240, 0.3);
        }

        .btn-link:hover {
            background-color: #009ce0;
        }

        .btn-link:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #b0bac5;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Blå OnlyFans-aktig banner på toppen -->
        <div class="banner"></div>

        <div class="profile-section">
            <!-- Profilbilde-sirkel (kan byttes ut med et ekte bilde-url i src om ønskelig) -->
            <div class="avatar">A</div>

            <div class="info">
                <h1>alectra00</h1>
                <p>@alectra00 • 0 bilder • 0 videoer</p>
                
                <div class="exclusive-box">
                    <h2>Eksklusivt innhold</h2>
                    <p style="color: #4a5568; font-size: 14px; margin-bottom: 0;">Lås opp feeden og se alt det private innholdet her.</p>
                </div>

                <!-- Selve "Troll"-knappen som omdirigerer -->
                <a href="https://www.twitch.tv/alectra00" target="_blank" rel="noopener noreferrer" class="btn-link">
                    TRYKK HER FOR EKSKLUSIVE BILDER
                </a>
            </div>

            <div class="footer">
                © OnlyFans, 2026
            </div>
        </div>
    </div>

</body>
</html>
